name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

x-strategy: &strategy
  matrix:
    host: [procyon]
  fail-fast: false

x-setup-ssh: &setup-ssh
  name: Setup SSH
  uses: shimataro/ssh-key-action@v2
  with:
    key: ${{ secrets.NIXBUILD_SSH_KEY }}
    name: id_ed25519
    known_hosts: "eu.nixbuild.net ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPIQCZc54poJ8vqawd8TraNryQeJnvH1eLpIDgbiqymM"
    config: |
      Host eu.nixbuild.net
        ServerAliveInterval 60
        IPQoS throughput

x-install-nix: &install-nix
  name: Install Nix
  uses: nixbuild/nix-quick-install-action@v34
  with:
    enable_kvm: false
    nix_conf: |
      substituters = https://cache.nixos.org/ ssh://eu.nixbuild.net
      trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixbuild.net/bob-1:8tJU22/XxyINhP+wM65gwSIlg0rrQrmWhFf5+8u8F/s=
      builders = eu.nixbuild.net x86_64-linux - 100 1 benchmark,big-parallel

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - *setup-ssh
      - *install-nix

      - name: Update flake (if triggered by the cron)
        if: github.event_name == 'schedule'
        run: nix flake update

      - name: Upload flake.lock
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock

      - name: Check
        run: nix flake check --store ssh-ng://eu.nixbuild.net

  build:
    needs: check
    runs-on: ubuntu-latest
    strategy: *strategy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - *setup-ssh
      - *install-nix

      - name: Download updated flake.lock
        if: github.event_name == 'schedule'
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Build
        run: |
          nix build --store ssh-ng://eu.nixbuild.net \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

  vulnix:
    needs: build
    runs-on: ubuntu-latest
    strategy: *strategy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - *setup-ssh
      - *install-nix

      - name: Get store path
        id: path
        run: |
          OUT=$(nix eval --raw \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel)
          echo "store_path=$OUT" >> $GITHUB_OUTPUT

      - name: Copy from remote store
        run: nix copy --from ssh-ng://eu.nixbuild.net ${{ steps.path.outputs.store_path }}

      - name: Scan
        run: |
          nix run github:tiiuae/sbomnix#vulnxscan -- \
            ${{ steps.path.outputs.store_path }} --out vulns.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: vulns-${{ matrix.host }}
          path: vulns.csv

      - name: Summary
        run: |
          echo "## Vulnerability Scan: ${{ matrix.host }}" >> $GITHUB_STEP_SUMMARY
          if [ -s vulns.csv ]; then
            echo "⚠️ Vulnerabilities found:" >> $GITHUB_STEP_SUMMARY
            head -50 vulns.csv >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  commit:
    needs: vulnix
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Commit flake.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --staged --quiet || git commit -m "chore: bump flake.lock"
          git push
