name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  BUILDER: 158.178.156.3 # deneb

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.configs.outputs.matrix }}
      flake: ${{ steps.archive.outputs.flake }}
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - &setup-ssh
        name: Setup SSH
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan $BUILDER >> ~/.ssh/known_hosts
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
      - id: archive
        name: Archive flake to builder
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          nix flake archive --to ssh-ng://builder@$BUILDER
          echo "flake=$(nix flake metadata --json | jq -r .path)" >> $GITHUB_OUTPUT
      - id: configs
        run: |
          NAMES=$(nix eval .#nixosConfigurations --apply 'builtins.attrNames' --json)
          echo "matrix={\"config\":$NAMES}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 2
      fail-fast: false
    steps:
      - *setup-ssh
      - name: Build
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          while sleep 300; do echo "=== still building ==="; done &
          HEARTBEAT=$!
          ssh -o ServerAliveInterval=60 builder@$BUILDER \
            nix build "path:${{ needs.setup.outputs.flake }}#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel" \
             --out-link ${{ matrix.config }}
          kill $HEARTBEAT

  clean:
    needs: build
    if: success() || failure()
    runs-on: ubuntu-latest
    steps:
      - *setup-ssh
      - name: Collect Garbage
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: ssh builder@$BUILDER nix-collect-garbage
