name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/nix-setup
        with:
          ssh_key: ${{ secrets.NIXBUILD_SSH_KEY }}

      - name: Update flake
        if: github.event_name == 'schedule'
        run: nix flake update

      - name: Upload flake.lock
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock

      - name: Check
        run: nix flake check

  build:
    needs: check
    runs-on: ubuntu-latest
    strategy: &strategy
      matrix:
        host: [procyon]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/nix-setup
        with:
          ssh_key: ${{ secrets.NIXBUILD_SSH_KEY }}

      - name: Download updated flake.lock
        if: github.event_name == 'schedule'
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Build
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

  vulnix:
    needs: build
    runs-on: ubuntu-latest
    strategy: *strategy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/nix-setup
        with:
          ssh_key: ${{ secrets.NIXBUILD_SSH_KEY }}

      - name: Build
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

      - name: Scan
        run: |
          nix run github:tiiuae/sbomnix#vulnxscan -- ./result --out vulns.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: vulns-${{ matrix.host }}
          path: vulns.csv

      - name: Summary
        run: |
          echo "## Vulnerability Scan: ${{ matrix.host }}" >> $GITHUB_STEP_SUMMARY
          if [ -s vulns.csv ]; then
            echo "⚠️ Vulnerabilities found:" >> $GITHUB_STEP_SUMMARY
            head -50 vulns.csv >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  commit:
    needs: vulnix
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Commit flake.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --staged --quiet || git commit -m "chore: bump flake.lock"
          git push
