name: Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  vulnxscan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [procyon]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH 
        env:
          SSH_KEY: ${{ secrets.NIXBUILD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          echo "eu.nixbuild.net ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPIQCZc54poJ8vqawd8TraNryQeJnvH1eLpIDgbiqymM" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          enable_kvm: false
          nix_conf: |
            substituters = https://cache.nixos.org/ ssh://eu.nixbuild.net
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixbuild.net/bob-1:8tJU22/XxyINhP+wM65gwSIlg0rrQrmWhFf5+8u8F/s=
            builders = eu.nixbuild.net x86_64-linux - 100 1 benchmark,big-parallel

      - name: Build
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
      
      - name: Scan
        run: nix run github:tiiuae/sbomnix#vulnxscan -- result --out vulns.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: vulns-${{ matrix.host }}
          path: vulns.csv

      - name: Summary
        run: |
          echo "## Vulnerability Scan: ${{ matrix.host }}" >> $GITHUB_STEP_SUMMARY
          if [ -s vulns.csv ]; then
            echo "⚠️ Vulnerabilities found:" >> $GITHUB_STEP_SUMMARY
            head -50 vulns.csv >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
